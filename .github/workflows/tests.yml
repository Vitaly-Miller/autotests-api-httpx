# Имя workflow, которое будет отображаться в интерфейсе GitHub Actions
name: API tests

# Указываем, когда будет запускаться данный workflow
on:
  push:
    branches:
      - main                  # Запускать workflow, когда будет сделан коммит в ветку main
  pull_request:
    branches:
      - main                  # Запускать workflow, когда будет сделан pull request в ветку main

# Определяем все джобы, которые должны быть выполнены в рамках работы с тестами
jobs:
  #============================================ Джоба 1: запуск автотестов =============================================
  run-tests:
    runs-on: ubuntu-latest    # Указываем, что тесты будут запускаться на последней версии Ubuntu

    steps:
      # 1. Шаг, который будет клонировать репозиторий на машину GitHub Actions
      - name: Check out repository
        uses: actions/checkout@v7      # Используем GitHub Action для клонирования репозитория ⚠️https://github.com/actions/checkout

      # 2. Шаг для установки Python на виртуальной машине
      - name: Set up Python
        uses: actions/setup-python@v6  # Используем GitHub Action для установки Python ⚠️https://github.com/actions/setup-python
        with:
          python-version: '3.13'       # Устанавливаем версию Python 3.13 ⚠️https://github.com/actions/setup-python

      # 3. Шаг для клонирования репозитория с тестовым сервером в рабочую среду
      - name: Clone test server repository
        run: git clone https://github.com/Vitaly-Miller/autotests-api-server.git  # ⚠️Путь репозитория с сервером

      # 4. Шаг для установки зависимостей для тестового СЕРВЕРА
      - name: Install test server dependencies
        run: pip install -r autotests-api-server/requirements.txt                 # ⚠️Путь файла с зависимостями

      # 5. Шаг для запуска тестового СЕРВЕРА с необходимыми переменными окружения
      - name: Start a test server
        env:
          APP_HOST: "http://localhost:8000"                              # Устанавливаем адрес хоста сервера
          DATABASE_URL: "sqlite+aiosqlite:///./local.db"                 # Устанавливаем URL локальной базы данных
          JWT_ALGORITHM: "HS256"                                         # Алгоритм для JWT токенов
          JWT_SECRET_KEY: "autotests-api-server-secret-key"              # ⚠️Секретный ключ для JWT
          JWT_ACCESS_TOKEN_EXPIRE: 1800                                  # Время жизни access token (в секундах)
          JWT_REFRESH_TOKEN_EXPIRE: 5184000                              # Время жизни refresh token (в секундах)
        run: uvicorn main:app --host 0.0.0.0 --port 8000 --app-dir ./autotests-api-server > server.log 2>&1 &  # ⚠️Запускаем сервер с указанными переменными окружения (лог — в server.log)

      # 6. Шаг для установки всех зависимостей проекта
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip         # Обновляем pip до последней версии
          pip install -r requirements.txt             # Устанавливаем зависимости проекта, указанные в requirements.txt

      # 6.1. Шаг-проверка, что тестовый сервер поднялся (иначе выводим его лог и останавливаем workflow)
      - name: Wait for test server
        run: |
          for i in {1..15}; do
            curl -sf http://localhost:8000/docs > /dev/null && echo "✅ Server is up" && exit 0
            sleep 2
          done
          echo "❌ Server failed to start. Log:" && cat server.log && exit 1

      # 7. Шаг для запуска тестов с использованием pytest и генерации результатов Allure
      - name: Run API tests with pytest and generate Allure results
        run: pytest --alluredir=allure-results       # --numprocesses 2 (+ параллельность - откл.)  # ⚠️Запускаем ВСЕ тесты, генерируем результаты для Allure

      # 8. Шаг для восстановления истории покрытия (coverage-history.json) из кеша GitHub Actions
      - name: Restore Coverage history
        uses: actions/cache/restore@v6               # Используем GitHub Action для работы с кешем ⚠️https://github.com/actions/cache
        with:
          path: coverage-history.json                # Файл с историей покрытия по запускам
          key: coverage-history-${{ github.run_id }} # Уникальный ключ текущего запуска
          restore-keys: coverage-history-            # Если точного совпадения нет — берём последнюю сохранённую историю

      # 9. Шаг для генерации HTML-отчёта покрытия и обновления истории (swagger-coverage-tool)
      - name: Generate Coverage report
        run: swagger-coverage-tool save-report       # Генерируем coverage.html + coverage-report.json, обновляем coverage-history.json

      # 10. Шаг для сохранения обновлённой истории покрытия обратно в кеш
      - name: Cache Coverage history
        if: always()                                 # ВСЕГДА выполняем, независимо от успеха или неудачи предыдущих шагов
        uses: actions/cache/save@v4
        with:
          path: coverage-history.json                # Файл с историей покрытия по запускам
          key: coverage-history-${{ github.run_id }} # Сохраняем под ключом текущего запуска

      # 11. Шаг для загрузки HTML-отчёта покрытия как артефакта
      - name: Upload Coverage report
        if: always()                                 # ВСЕГДА выполняем, независимо от успеха или неудачи предыдущих шагов
        uses: actions/upload-artifact@v7             # Используем GitHub Action для загрузки артефактов ⚠️https://github.com/actions/upload-artifact
        with:
          name: coverage-report                      # Имя артефакта
          path: coverage.html                        # Файл HTML-отчёта покрытия

      # 12. Шаг для сохранения папки allure-results как артефакта (для передачи в джобу publish-report)
      - name: Upload Allure results
        if: always()                                 # ВСЕГДА выполняем, независимо от успеха или неудачи предыдущих шагов
        uses: actions/upload-artifact@v7             # Используем GitHub Action для загрузки артефактов ⚠️https://github.com/actions/upload-artifact
        with:
          name: allure-results                       # Имя артефакта
          path: allure-results                       # Папка с результатами тестов


  #==================================== Джоба 2: публикация отчёта на GitHub Pages =====================================
  publish-report:
    needs: [ run-tests ]                       # Джоба запускается только после успешного выполнения run-tests
    runs-on: ubuntu-latest                     # Указываем, что публикация будет выполняться на последней версии Ubuntu

    steps:
      # 1. Шаг для получения истории отчётов Allure, если она существует
      - name: Get Allure history
        uses: actions/checkout@v7              # ⚠️Клонируем репозиторий, чтобы получить историю отчётов ⚠️https://github.com/actions/checkout
        continue-on-error: true                # Если ветки gh-pages ещё нет, workflow всё равно продолжит выполнение
        with:
          ref: gh-pages                        # Указываем ветку gh-pages для получения отчётов
          path: gh-pages                       # Указываем путь для сохранения отчётов

      # 2. Шаг для загрузки артефакта allure-results, сохранённого в джобе run-tests
      - name: Download Allure results
        uses: actions/download-artifact@v8            # Используем GitHub Action для скачивания артефактов ⚠️ https://github.com/actions/download-artifact
        with:
          name: allure-results                        # Имя артефакта
          path: allure-results                        # Папка, в которую будут загружены результаты тестов

      # 3. Шаг для генерации отчёта Allure с историей
      - name: Generate Allure Report with history
        uses: simple-elf/allure-report-action@master  # Используем готовое решение из GitHub Marketplace ⚠️https://github.com/simple-elf/allure-report-action
        with:
          allure_results: allure-results              # Указываем каталог с результатами тестов
          allure_history: allure-history              # Указываем каталог для истории отчётов Allure

      # 4. Шаг для деплоя отчёта Allure на GitHub Pages, чтобы его можно было просматривать в браузере
      - name: Deploy report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4           # Используем GitHub Action для публикации отчёта на GitHub Pages ⚠️https://github.com/peaceiris/actions-gh-pages
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}   # Токен для аутентификации на GitHub
          publish_branch: gh-pages                    # Указываем, что отчёт будет опубликован в ветке gh-pages
          publish_dir: allure-history                 # Указываем папку, которая будет опубликована на GitHub Pages


