# pytest.ini - Pytest configuration file
[pytest]

#=================================================== Run flags =========================================================
# Автоматическое добавление флагов при запуске тестов (pytest ↲)
addopts = -s -v

# C сохранением Allure отчета (с отчисткой перед запуском)
#addopts = -s -v --alluredir=./allure-results --clean-alluredir

#=================================================== Find test =========================================================
# Файлы с тестами (default)
python_files = test_*.py *_test.py

# Классы с тестами (default)
python_classes = Test*

# Функции (методы) с тестами (default)
python_functions = test_*

#=================================================== Markers ===========================================================
# Кастомные маркеры (⚠️что бы не вылазило <PytestUnknownMarkWarning ========= warnings summary ========>)
markers =
    smoke:       Smoke тесты
    regression:  Регрессионные тесты
    negative:    Негативные тесты
    -----------
    users:       Тесты, связанные с пользователями
    auth:        Тесты, связанные с авторизацией (Log in)
    files:       Тесты, связанные с файлами
    courses:     Тесты, связанные с курсами
    exercises:   Тесты, связанные с заданиями


;                                                     ⬇︎ ИЛИ ⬇︎
#============================================ Warnings ignore (BAD PRACTICE)============================================
# Игнорирование предупреждений (PytestWarning)
filterwarnings =
;    ignore::pytest.PytestUnknownMarkWarning

#=======================================================================================================================
